[global]
developmentMode = false

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#6366F1"
backgroundColor = "#0A0C12"
secondaryBackgroundColor = "#161926"
textColor = "#F1F5F9"
font = "sans serif"

[ui]
hideTopBar = true

[client]
showSidebarNavigation = false
toolbarMode = "minimal"
